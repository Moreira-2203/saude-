<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recepcao | Saude+</title>
  <link rel="stylesheet" href="../../assets/css/admin.css"/>
</head>
<body>
  <header>
    <div class="logo">
      <img src="../../assets/img/logo.png" alt="Saude+" />
    </div>
    <nav>
      <a href="#" class="active">Enviar Exames</a>
    </nav>
    <div class="icons">
      <div class="user-icon"></div>
      <div class="logout-icon"></div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <div class="panel-header">
        <h3>Enviar Exame</h3>
      </div>
      <div class="exam-form">
        <div class="form-row">
          <label>Paciente</label>
          <select id="examPatient" class="select"></select>
        </div>
        <div class="form-row">
          <label>Nome do Exame</label>
          <input id="examName" type="text" />
        </div>
        <div class="form-row">
          <label>Laboratorio</label>
          <input id="examLab" type="text" />
        </div>
        <div class="form-row">
          <label>Arquivo</label>
          <input id="examFile" type="file" accept=".pdf,.png,.jpg,.jpeg" />
        </div>
      </div>
      <div class="modal-actions" style="margin-top: 10px;">
        <button id="uploadExam" class="btn primary">Enviar</button>
      </div>

      <div class="panel-header" style="margin-top: 20px;">
        <h3>Exames do Paciente</h3>
      </div>
      <div id="examListWrap"></div>
    </section>
  </main>

  <script src="../../assets/js/recepcao.js"></script>
</body>
</html>
